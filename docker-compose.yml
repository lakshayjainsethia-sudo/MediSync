services:
  # Node.js API
  api-gateway:
    build: 
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/medisync}
      - JWT_SECRET=${JWT_SECRET:-change_me_jwt_secret_min_32_chars}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change_me_refresh_secret_min_32_chars}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET:-change_me_encryption_secret_32_chars}
      - MASTER_KEY=${MASTER_KEY:-change_me_master_key}
      - CLIENT_URL=http://localhost:5173
      - FASTAPI_URL=${FASTAPI_URL:-http://host.docker.internal:8000}
    depends_on:
      - mongo
    networks:
      - medisync-network

  # Frontend (Vite)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api/v1
      - VITE_DEV_PROXY_TARGET=http://api-gateway:5000
    depends_on:
      - api-gateway
    networks:
      - medisync-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    networks:
      - medisync-network

  # Database
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - medisync-network

networks:
  medisync-network:
    driver: bridge

volumes:
  mongo-data:
