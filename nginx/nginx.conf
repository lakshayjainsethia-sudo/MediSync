events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    server {
        listen 80;
        server_name localhost;

        # Forward /api requests to the Node.js API Gateway
        location /api/ {
            proxy_pass http://api-gateway:5000/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Forward socket.io requests
        location /socket.io/ {
            proxy_pass http://api-gateway:5000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Block direct external access to intelligence engine if accidentally requested
        location /triage/ {
            deny all;
            return 403;
        }
    }
}
